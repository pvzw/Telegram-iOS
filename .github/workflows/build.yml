name: Build Telegram IPA 
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive 
      - name: Apply patches
        run: |
          find . -name "AccountInfoController.swift" -exec sed -i '' \
          's/self\._username = presentationData\.user?\.username ?? ""/let realUsername = presentationData.user?.username ?? ""; let spoofedUsername = UserDefaults.standard.string(forKey: "spoofed_username") ?? realUsername; self._username = spoofedUsername/g' {} \;
          mkdir -p Telegram/SourceFiles/NFT
          cat > Telegram/SourceFiles/NFT/NFTCollectionManager.swift << 'EOF'
          import UIKit
          import Foundation
          @objc public class NFTCollectionManager: NSObject {
              @objc public static let shared = NFTCollectionManager()
              private let storageKey = "local_nft_collection"
              @objc public func loadLocalNFTs() -> [[String: Any]]? {
                  guard let data = UserDefaults.standard.data(forKey: storageKey) else { return nil }
                  return try? JSONSerialization.jsonObject(with: data) as? [[String: Any]]
              }
              @objc public func saveLocalNFTs(_ nfts: [[String: Any]]) {
                  if let data = try? JSONSerialization.data(withJSONObject: nfts) {
                      UserDefaults.standard.set(data, forKey: storageKey)
                  }
              }
              @objc public func addNFT(name: String, imageURL: String, collection: String) {
                  var current = loadLocalNFTs() ?? []
                  let entry: [String: Any] = [
                      "name": name,
                      "image": imageURL,
                      "collection": collection,
                      "timestamp": Date().timeIntervalSince1970
                  ]
                  current.append(entry)
                  saveLocalNFTs(current)
              }
          }
          EOF
          cat > Telegram/SourceFiles/NFT/UsernameSpoofer.swift << 'EOF'
          import Foundation
          @objc public class UsernameSpoofer: NSObject {
              @objc public static let shared = UsernameSpoofer()
              @objc public func setSpoofedUsername(_ username: String) {
                  UserDefaults.standard.set(username, forKey: "spoofed_username")
                  NotificationCenter.default.post(name: NSNotification.Name("UsernameSpoofed"), object: nil)
              }
              @objc public func getSpoofedUsername() -> String {
                  return UserDefaults.standard.string(forKey: "spoofed_username") ?? ""
              }
              @objc public func resetToReal() {
                  UserDefaults.standard.removeObject(forKey: "spoofed_username")
              }
          }
          EOF
          find . -name "AppDelegate.swift" -exec sed -i '' '/func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:/a \
          _ = NFTCollectionManager.shared\n        _ = UsernameSpoofer.shared' {} \;
      - name: Install dependencies
        run: |
          brew install cocoapods
          pod install --repo-update
      - name: Archive and export
        run: |
          xcodebuild archive -workspace Telegram.xcworkspace -scheme Telegram -archivePath ./Telegram.xcarchive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          xcodebuild -exportArchive -archivePath ./Telegram.xcarchive -exportPath ./ -exportOptionsPlist /dev/null -allowProvisioningUpdates
      - uses: actions/upload-artifact@v4
        with:
          name: Telegram-ipa
          path: ./Telegram.ipa
